spring:
  application:
    name: currency-service

  liquibase:
    change-log: classpath:liquibase/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      connect-timeout: 2s
      timeout: 1s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_USERNAME}

  jpa:
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        jdbc.hibernate.jdbc.batch_size: 50
        jdbc.batch_size: 15
        order_inserts: true
        order_updates: true
        query.fail_on_pagination_over_collection_fetch: true
        query.in_clause_parameter_padding: true
    hibernate:
      ddl-auto: none

  jackson:
    datatype:
      date-time:
        write-dates-as-timestamps: false
    serialization:
      indent-output: true

cache:
  lifetime-minutes:
    60

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    url: /openapi/currency.yaml

rate-provider:
  api:
    url: ${RATE_PROVIDER_URL}

